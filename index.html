<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomMe — Smart Rental Management for Students</title>
  <meta name="description"
    content="RoomMe is a web-based rental management platform for students, landlords, and administrators. Simplify housing search, rental management, and payments." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    /* Upload zone component */
    .upload-zone {
      padding: 1rem;
      background: var(--bg-glass);
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--font-sm);
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover {
      border-color: var(--accent-primary);
      background: rgba(0, 212, 170, 0.04);
    }

    /* Profile photo upload wrapper */
    .profile-photo-wrapper {
      position: relative;
      display: inline-block;
    }
    .profile-photo-upload-btn {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      border: 2px solid var(--bg-body);
      transition: transform 0.2s, background 0.2s;
      z-index: 2;
    }
    .profile-photo-upload-btn:hover {
      transform: scale(1.1);
      background: var(--accent-secondary);
    }

    /* Favorite button filled state */
    .property-card-favorite.favorited {
      color: #ff4757;
      background: rgba(255,71,87,0.15);
    }

    /* Filter chip active state */
    .filter-chip {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: var(--font-sm);
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      transition: all 0.2s;
      user-select: none;
    }
    .filter-chip:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    .filter-chip.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: white;
      font-weight: 600;
    }

    /* OTP input */
    input[autocomplete="one-time-code"] {
      letter-spacing: 8px;
    }

    /* Quick actions - 3 per row */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    /* Notification items clickable */
    .notification-item {
      transition: background 0.15s;
    }
    .notification-item:hover {
      background: rgba(255,255,255,0.04);
    }

    /* Match card avatar as photo */
    .match-avatar {
      overflow: hidden;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="navbar-container"></div>
    <main id="page-content"></main>
    <div id="toast-container"></div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>
  </div>

  <!-- API Client (must be first) -->
  <script src="js/api.js"></script>

  <!-- Data -->
  <script src="js/data/users.js"></script>
  <script src="js/data/properties.js"></script>
  <script src="js/data/messages.js"></script>
  <script src="js/data/maintenance.js"></script>
  <script src="js/data/payments.js"></script>
  <script src="js/data/applications.js"></script>
  <script src="js/data/notifications.js"></script>
  <script src="js/data/favorites.js"></script>

  <!-- Components -->
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/charts.js"></script>

  <!-- Pages -->
  <script src="js/pages/landing.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/verify-email.js"></script>
  <script src="js/pages/properties-list.js"></script>
  <script src="js/pages/property-detail.js"></script>
  <script src="js/pages/favorites.js"></script>
  <script src="js/pages/student-dashboard.js"></script>
  <script src="js/pages/landlord-dashboard.js"></script>
  <script src="js/pages/admin-dashboard.js"></script>
  <script src="js/pages/roommates.js"></script>
  <script src="js/pages/maintenance.js"></script>
  <script src="js/pages/payments.js"></script>
  <script src="js/pages/messages.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/applications.js"></script>

  <!-- Core -->
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
